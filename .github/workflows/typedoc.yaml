name: "typedoc"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        # Install the latest version of npm since we need npm 11.5.1 or later to publish to npm using OIDC (see
        # https://docs.npmjs.com/trusted-publishers).
        run: npm install -g npm@latest

      - name: Install bun
        run: npm install -g bun

      - name: Install packages
        run: bun install

      - name: Generate documentation
        run: bun run build-docs

      - name: Deploy documentation to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages || true

          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git worktree add /tmp/gh-pages gh-pages
          else
            git worktree add -b gh-pages /tmp/gh-pages
          fi

          rsync -a --delete --exclude '.git' docs/ /tmp/gh-pages/
          touch /tmp/gh-pages/.nojekyll

          cd /tmp/gh-pages
          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to deploy."
            exit 0
          fi

          git commit -m "Deploy TypeDoc for ${GITHUB_SHA}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
